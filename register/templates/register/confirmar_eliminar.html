{% extends 'register/index.html' %}

{% block body %}
<div class="container mt-5">
    <div class="card border-danger mb-3">
        <div class="card-header text-white bg-danger">
            Confirmar Eliminación
        </div>
        <div class="card-body">
            <h5 class="card-title">¿Estás seguro de que deseas eliminar a {{ mascota.nombre }}?</h5>
            <p class="card-text">
                Estás a punto de borrar los datos de <strong>{{ mascota.nombre }}</strong> ({{ mascota.especie }}). 
                Esta acción no se puede deshacer.
            </p>
            
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="/registros" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
