{% extends 'register/index.html' %}

{% block body %}
<div class="container mt-4">
    <h2>Registrar nueva mascota</h2>
    <hr>
    
    <!-- formulario -->
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div class="mt-3">
            <button type="submit" class="btn btn-success">Guardar Mascota</button>
            <a href="/registros" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
